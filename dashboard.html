<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metal Prices Dashboard — USD / EUR per metric ton</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0e10;
      --bg-elevated: #13161a;
      --bg-card: #181c22;
      --border: #2a2f38;
      --text: #e8eaef;
      --text-muted: #7d8594;
      --gold: #d4a853;
      --gold-dim: #9a7b3a;
      --silver: #a8b2c1;
      --silver-dim: #6b7585;
      --copper: #c4785a;
      --aluminum: #7a8fa3;
      --lithium: #6b9b7a;
      --usd: #5a9b6e;
      --eur: #6b7ec9;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .dashboard {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .header-left h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-left p {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .header-right {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
    }

    .currency-toggle {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 2px;
    }

    .currency-toggle button {
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.4rem 0.75rem;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .currency-toggle button.active {
      background: var(--bg-elevated);
      color: var(--text);
    }

    .currency-toggle button:hover:not(.active) {
      color: var(--text);
    }

    .load-csv {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .load-csv input[type="file"] {
      display: none;
    }

    .load-csv label {
      cursor: pointer;
      text-decoration: underline;
      color: var(--silver-dim);
    }

    .load-csv label:hover { color: var(--silver); }

    .chart-mode-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .chart-mode-toggle .segmented {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 2px;
    }

    .chart-mode-toggle .segmented button {
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.35rem 0.6rem;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .chart-mode-toggle .segmented button.active {
      background: var(--bg-elevated);
      color: var(--text);
    }

    .chart-mode-toggle .segmented button:hover:not(.active) { color: var(--text); }

    .chart-mode-toggle label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metal-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .metal-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }

    .metal-card:hover {
      border-color: var(--text-muted);
    }

    .metal-card.active {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px var(--gold);
    }

    .metal-card[data-metal="gold"] { --metal-color: var(--gold); }
    .metal-card[data-metal="silver"] { --metal-color: var(--silver); }
    .metal-card[data-metal="copper"] { --metal-color: var(--copper); }
    .metal-card[data-metal="aluminum"] { --metal-color: var(--aluminum); }
    .metal-card[data-metal="lithium"] { --metal-color: var(--lithium); }

    .metal-card .name {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--metal-color);
      margin-bottom: 0.5rem;
    }

    .metal-card .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
    }

    .metal-card .value-usd { color: var(--usd); }
    .metal-card .value-eur { color: var(--eur); }

    .metal-card .spark {
      height: 32px;
      margin-top: 0.5rem;
      border-radius: 4px;
      opacity: 0.85;
    }

    .dashboard-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: flex-start;
    }

    .dashboard-row .metal-cards { flex: 1; min-width: 200px; }

    .fx-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      min-width: 220px;
      width: 280px;
    }

    .fx-card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
    }

    .fx-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); }
    .fx-value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; color: var(--text); }

    .fx-chart-wrap { height: 100px; position: relative; }

    .chart-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }

    .chart-section h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .chart-section h2 span { color: var(--text); }

    .chart-wrap {
      position: relative;
      height: 320px;
    }

    .chart-wrap .candle-chart-wrap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .footer-note {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      align-items: center;
    }

    .footer-note a { color: var(--silver-dim); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; color: var(--silver); }
    .footer-meta { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div class="dashboard">
    <header>
      <div class="header-left">
        <h1>Metal prices (oz / mt)</h1>
        <p id="date-range">Last month — USD / EUR</p>
      </div>
      <div class="header-right">
        <div class="currency-toggle" role="group" aria-label="Currency">
          <button type="button" id="curr-usd" class="active">USD</button>
          <button type="button" id="curr-eur">EUR</button>
        </div>
        <div class="load-csv">
          <input type="file" id="csv-file" accept=".csv">
          <label for="csv-file">Load CSV</label>
        </div>
      </div>
    </header>

    <div class="dashboard-row">
      <div class="metal-cards" id="metal-cards"></div>
      <section class="fx-card" id="fx-card">
        <div class="fx-card-header">
          <span class="fx-title" id="fx-chart-title">USD/EUR</span>
          <span class="fx-value" id="fx-last-value">—</span>
        </div>
        <div class="fx-chart-wrap">
          <canvas id="fx-chart"></canvas>
        </div>
      </section>
    </div>

    <section class="chart-section">
      <h2>Trend — <span id="chart-metal-name">Gold</span> <span id="chart-currency">(USD/oz)</span></h2>
      <div class="chart-mode-toggle">
        <label>Chart</label>
        <div class="segmented" role="group" aria-label="Chart type">
          <button type="button" id="mode-line" class="active">Line</button>
          <button type="button" id="mode-candle">Candlestick</button>
        </div>
        <label style="margin-left: 0.5rem;">Period</label>
        <div class="segmented" role="group" aria-label="Period">
          <button type="button" id="period-day" class="active">Day</button>
          <button type="button" id="period-week">Week</button>
          <button type="button" id="period-month">Month</button>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="main-chart"></canvas>
        <div id="candle-chart-wrap" class="candle-chart-wrap" style="display: none;"></div>
      </div>
    </section>

    <p class="footer-note">
      <span>Data: <code>metal_prices_source_mt.csv</code> — dailymetalprice.com + Frankfurter EUR/USD.</span>
      <span class="footer-meta" id="embedded-last-date">Last data: —</span>
      <span class="footer-meta" id="embedded-generated-at">Generated: —</span>
    </p>
  </div>

  function parseCSV(csvText) {
    const lines = csvText.trim().split(/\r?\n/);
    if (lines.length < 2) return { dates: [], metals: {}, fxRates: [] };
    const headers = lines[0].split(',').map(h => h.trim());
    const dateIdx = headers.indexOf('date');
    if (dateIdx === -1) return { dates: [], metals: {}, fxRates: [] };

    const metals = {};
    const unitKeys = {};
    METALS.forEach(m => {
      metals[m] = { usd: [], eur: [] };
      const u = METAL_UNITS[m];
      unitKeys[m] = headers.indexOf(m + '_usd_' + u) >= 0 ? u : 'mt';
    });

    const dates = [];
    const fxRates = [];
    for (let i = 1; i < lines.length; i++) {
      const row = lines[i].split(',');
      const date = row[dateIdx] && row[dateIdx].trim();
      if (!date) continue;
      dates.push(date);

      let rate = null;
      METALS.forEach(metal => {
        const u = unitKeys[metal];
        const uKey = metal + '_usd_' + u;
        const eKey = metal + '_eur_' + u;
        const uIdx = headers.indexOf(uKey);
        const eIdx = headers.indexOf(eKey);
        let usdVal = uIdx >= 0 ? parseFloat(row[uIdx]) : NaN;
        let eurVal = eIdx >= 0 ? parseFloat(row[eIdx]) : NaN;
        metals[metal].usd.push(Number.isFinite(usdVal) ? usdVal : null);
        metals[metal].eur.push(Number.isFinite(eurVal) ? eurVal : null);
        if (Number.isFinite(usdVal) && Number.isFinite(eurVal) && usdVal > 0 && rate === null)
          rate = eurVal / usdVal;
      });
      fxRates.push(rate);
    }

    function forwardFill(arr) {
      let last = null;
      return arr.map(v => {
        if (v != null && Number.isFinite(v)) last = v;
        return last;
      });
    }

    METALS.forEach(m => {
      metals[m].usd = forwardFill(metals[m].usd);
      metals[m].eur = forwardFill(metals[m].eur);
    });
    let lastFx = null;
    const filledFx = fxRates.map(r => {
      if (r != null && Number.isFinite(r)) lastFx = r;
      return lastFx;
    });

    return { dates, metals, unitKeys, fxRates: filledFx };
  }

  function formatPrice(val) {
    if (val == null || !Number.isFinite(val)) return '—';
    if (val >= 1e9) return (val / 1e9).toFixed(2) + 'B';
    if (val >= 1e6) return (val / 1e6).toFixed(2) + 'M';
    if (val >= 1e3) return (val / 1e3).toFixed(2) + 'K';
    return val.toFixed(2);
  }

  const COLORS = {
    gold: '#d4a853',
    silver: '#a8b2c1',
    copper: '#c4785a',
    aluminum: '#7a8fa3',
    lithium: '#6b9b7a'
  };

  let state = {
    data: parseCSV(EMBEDDED_CSV),
    currency: 'usd',
    selectedMetal: 'gold',
    chartMode: 'line',
    period: 'day'
  };

  function getMonday(dateStr) {
    const d = new Date(dateStr + 'T12:00:00Z');
    const day = d.getUTCDay();
    const diff = d.getUTCDate() - (day === 0 ? 6 : day - 1);
    d.setUTCDate(diff);
    return d.toISOString().slice(0, 10);
  }

  function buildOHLCDaily(dates, values) {
    const out = [];
    let prev = null;
    for (let i = 0; i < dates.length; i++) {
      const c = values[i];
      if (c == null || !Number.isFinite(c)) continue;
      const o = prev != null ? prev : c;
      out.push({
        time: dates[i],
        open: o,
        high: Math.max(o, c),
        low: Math.min(o, c),
        close: c
      });
      prev = c;
    }
    return out;
  }

  function buildOHLCWeekly(dates, values) {
    const buckets = {};
    for (let i = 0; i < dates.length; i++) {
      const c = values[i];
      if (c == null || !Number.isFinite(c)) continue;
      const weekKey = getMonday(dates[i]);
      if (!buckets[weekKey]) buckets[weekKey] = { time: weekKey, opens: [], highs: [], lows: [], closes: [] };
      const b = buckets[weekKey];
      if (b.opens.length === 0) b.opens.push(c);
      b.closes.push(c);
      b.highs.push(c);
      b.lows.push(c);
    }
    const weeks = Object.keys(buckets).sort();
    return weeks.map(w => {
      const b = buckets[w];
      const open = b.opens[0];
      const close = b.closes[b.closes.length - 1];
      return { time: w, open, high: Math.max(...b.highs), low: Math.min(...b.lows), close };
    });
  }

  function buildOHLCMonthly(dates, values) {
    const buckets = {};
    for (let i = 0; i < dates.length; i++) {
      const c = values[i];
      if (c == null || !Number.isFinite(c)) continue;
      const monthKey = dates[i].slice(0, 7) + '-01';
      if (!buckets[monthKey]) buckets[monthKey] = { time: monthKey, opens: [], highs: [], lows: [], closes: [] };
      const b = buckets[monthKey];
      if (b.opens.length === 0) b.opens.push(c);
      b.closes.push(c);
      b.highs.push(c);
      b.lows.push(c);
    }
    const months = Object.keys(buckets).sort();
    return months.map(m => {
      const b = buckets[m];
      const open = b.opens[0];
      const close = b.closes[b.closes.length - 1];
      return { time: m, open, high: Math.max(...b.highs), low: Math.min(...b.lows), close };
    });
  }

  function buildOHLC(period, dates, values) {
    if (period === 'day') return buildOHLCDaily(dates, values);
    if (period === 'week') return buildOHLCWeekly(dates, values);
    return buildOHLCMonthly(dates, values);
  }

  function aggregateForLine(period, dates, values) {
    if (period === 'day') return { labels: dates, values };
    if (period === 'week') {
      const buckets = {};
      for (let i = 0; i < dates.length; i++) {
        const v = values[i];
        if (v == null || !Number.isFinite(v)) continue;
        const weekKey = getMonday(dates[i]);
        if (!buckets[weekKey]) buckets[weekKey] = [];
        buckets[weekKey].push(v);
      }
      const weeks = Object.keys(buckets).sort();
      return {
        labels: weeks,
        values: weeks.map(w => buckets[w][buckets[w].length - 1])
      };
    }
    const buckets = {};
    for (let i = 0; i < dates.length; i++) {
      const v = values[i];
      if (v == null || !Number.isFinite(v)) continue;
      const monthKey = dates[i].slice(0, 7) + '-01';
      if (!buckets[monthKey]) buckets[monthKey] = [];
      buckets[monthKey].push(v);
    }
    const months = Object.keys(buckets).sort();
    return {
      labels: months,
      values: months.map(m => buckets[m][buckets[m].length - 1])
    };
  }

  function getLast(arr) {
    for (let i = arr.length - 1; i >= 0; i--) if (arr[i] != null) return arr[i];
    return null;
  }

  function getUnit(metal) {
    return (state.data.unitKeys && state.data.unitKeys[metal]) || METAL_UNITS[metal] || 'mt';
  }

  function renderCards() {
    const container = document.getElementById('metal-cards');
    const curr = state.currency;
    const key = curr === 'usd' ? 'usd' : 'eur';
    const currLabel = curr === 'usd' ? 'USD' : 'EUR';

    container.innerHTML = METALS.map(metal => {
      const series = state.data.metals[metal][key];
      const last = getLast(series);
      const unit = getUnit(metal);
      const active = state.selectedMetal === metal ? ' active' : '';
      return `
        <div class="metal-card${active}" data-metal="${metal}" role="button" tabindex="0">
          <div class="name">${METAL_LABELS[metal]}</div>
          <div class="value value-${curr}">${formatPrice(last)} <small>${currLabel}/${unit}</small></div>
          <canvas class="spark" data-metal="${metal}" width="180" height="32" aria-hidden="true"></canvas>
        </div>`;
    }).join('');

    container.querySelectorAll('.metal-card').forEach(card => {
      card.addEventListener('click', () => {
        state.selectedMetal = card.dataset.metal;
        renderCards();
        renderSparklines();
        updateChart();
        document.getElementById('chart-metal-name').textContent = METAL_LABELS[state.selectedMetal];
      });
    });

    const unit = getUnit(state.selectedMetal);
    document.getElementById('chart-metal-name').textContent = METAL_LABELS[state.selectedMetal];
    document.getElementById('chart-currency').textContent = `(${currLabel}/${unit})`;
    renderSparklines();
  }

  function renderSparklines() {
    const curr = state.currency;
    const key = curr === 'usd' ? 'usd' : 'eur';
    document.querySelectorAll('.spark').forEach(canvas => {
      const metal = canvas.dataset.metal;
      const values = state.data.metals[metal][key].filter(v => v != null && Number.isFinite(v));
      if (values.length < 2) return;

      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const pad = 2;

      ctx.clearRect(0, 0, w, h);
      ctx.beginPath();
      const step = (w - 2 * pad) / (values.length - 1);
      values.forEach((v, i) => {
        const x = pad + i * step;
        const y = h - pad - ((v - min) / range) * (h - 2 * pad);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = COLORS[metal];
      ctx.lineWidth = 1.5;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();
    });
  }

  let mainChart = null;
  let candleChart = null;
  let candleSeries = null;
  let fxChart = null;

  function updateFXChart() {
    const curr = state.currency;
    const rates = state.data.fxRates || [];
    const dates = state.data.dates || [];
    const valid = rates.filter(r => r != null && Number.isFinite(r));
    if (valid.length === 0) {
      document.getElementById('fx-chart-title').textContent = curr === 'usd' ? 'USD/EUR' : 'EUR/USD';
      document.getElementById('fx-last-value').textContent = '—';
      if (fxChart) { fxChart.destroy(); fxChart = null; }
      return;
    }
    if (curr === 'usd') {
      document.getElementById('fx-chart-title').textContent = 'USD/EUR';
      const last = getLast(rates);
      document.getElementById('fx-last-value').textContent = last != null ? last.toFixed(4) : '—';
    } else {
      document.getElementById('fx-chart-title').textContent = 'EUR/USD';
      const last = getLast(rates);
      document.getElementById('fx-last-value').textContent = last != null ? (1 / last).toFixed(4) : '—';
    }
    const values = curr === 'usd' ? rates : rates.map(r => r != null && r > 0 ? 1 / r : null);
    const el = document.getElementById('fx-chart');
    if (fxChart) fxChart.destroy();
    fxChart = new Chart(el, {
      type: 'line',
      data: {
        labels: dates,
        datasets: [{
          data: values,
          borderColor: '#7a8fa3',
          backgroundColor: 'rgba(122,143,163,0.15)',
          fill: true,
          tension: 0.2,
          pointRadius: 0,
          pointHoverRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { display: false },
          y: {
            display: true,
            grid: { color: 'rgba(42,47,56,0.5)' },
            ticks: { color: '#7d8594', maxTicksLimit: 4, callback: v => Number(v).toFixed(4) }
          }
        }
      }
    });
  }

  function updateChart() {
    const metal = state.selectedMetal;
    const curr = state.currency;
    const key = curr === 'usd' ? 'usd' : 'eur';
    const dates = state.data.dates;
    const values = state.data.metals[metal][key];
    const color = COLORS[metal];
    const currLabel = curr === 'usd' ? 'USD' : 'EUR';

    const unit = getUnit(metal);
    document.getElementById('chart-currency').textContent = `(${currLabel}/${unit})`;

    const canvasWrap = document.getElementById('main-chart').closest('.chart-wrap');
    const candleWrap = document.getElementById('candle-chart-wrap');

    if (state.chartMode === 'candle') {
      canvasWrap.querySelector('canvas').style.display = 'none';
      candleWrap.style.display = 'block';

      const ohlc = buildOHLC(state.period, dates, values);
      if (typeof LightweightCharts === 'undefined') {
        candleWrap.innerHTML = '<p style="color:var(--text-muted);padding:1rem;">Candlestick library loading…</p>';
        return;
      }
      if (!candleChart) {
        const w = candleWrap.parentElement.clientWidth || 600;
        candleChart = LightweightCharts.createChart(candleWrap, {
          layout: {
            background: { type: 'solid', color: 'transparent' },
            textColor: '#7d8594'
          },
          grid: { vertLines: { color: 'rgba(42,47,56,0.5)' }, horzLines: { color: 'rgba(42,47,56,0.5)' } },
          width: w,
          height: 320,
          rightPriceScale: {
            borderColor: '#2a2f38',
            scaleMargins: { top: 0.1, bottom: 0.1 }
          },
          timeScale: {
            borderColor: '#2a2f38',
            timeVisible: true,
            secondsVisible: false
          }
        });
        candleSeries = candleChart.addCandlestickSeries({
          upColor: color,
          downColor: color,
          borderUpColor: color,
          borderDownColor: color,
          wickUpColor: color,
          wickDownColor: color
        });
      }
      candleSeries.applyOptions({
        upColor: color,
        downColor: color,
        borderUpColor: color,
        borderDownColor: color,
        wickUpColor: color,
        wickDownColor: color
      });
      candleSeries.setData(ohlc);
      candleChart.timeScale().fitContent();
    } else {
      canvasWrap.querySelector('canvas').style.display = 'block';
      candleWrap.style.display = 'none';

      const { labels, values: aggValues } = aggregateForLine(state.period, dates, values);
      const cfg = {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: `${METAL_LABELS[metal]} (${currLabel}/${unit})`,
            data: aggValues,
            borderColor: color,
            backgroundColor: color + '20',
            fill: true,
            tension: 0.2,
            pointRadius: 2,
            pointHoverRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: 'index' },
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { color: 'rgba(42,47,56,0.6)' },
              ticks: { color: '#7d8594', maxTicksLimit: 12, font: { size: 11 } }
            },
            y: {
              grid: { color: 'rgba(42,47,56,0.6)' },
              ticks: { color: '#7d8594', callback: function(v) { return formatPrice(v); } }
            }
          }
        }
      };
      const el = document.getElementById('main-chart');
      if (mainChart) mainChart.destroy();
      mainChart = new Chart(el, cfg);
    }
  }

  function setChartMode(mode) {
    state.chartMode = mode;
    document.getElementById('mode-line').classList.toggle('active', mode === 'line');
    document.getElementById('mode-candle').classList.toggle('active', mode === 'candle');
    updateChart();
  }

  function setPeriod(period) {
    state.period = period;
    document.getElementById('period-day').classList.toggle('active', period === 'day');
    document.getElementById('period-week').classList.toggle('active', period === 'week');
    document.getElementById('period-month').classList.toggle('active', period === 'month');
    updateChart();
  }

  function init() {
    const lastEmbeddedDate = state.data.dates[state.data.dates.length - 1] || '—';
    document.getElementById('embedded-last-date').textContent = `Last data: ${lastEmbeddedDate}`;
    document.getElementById('embedded-generated-at').textContent = `Generated: ${EMBEDDED_GENERATED_AT}`;
    document.getElementById('curr-usd').addEventListener('click', () => {
      state.currency = 'usd';
      document.getElementById('curr-usd').classList.add('active');
      document.getElementById('curr-eur').classList.remove('active');
      renderCards();
      updateChart();
      updateFXChart();
    });
    document.getElementById('curr-eur').addEventListener('click', () => {
      state.currency = 'eur';
      document.getElementById('curr-eur').classList.add('active');
      document.getElementById('curr-usd').classList.remove('active');
      renderCards();
      updateChart();
      updateFXChart();
    });

    document.getElementById('mode-line').addEventListener('click', () => setChartMode('line'));
    document.getElementById('mode-candle').addEventListener('click', () => setChartMode('candle'));
    document.getElementById('period-day').addEventListener('click', () => setPeriod('day'));
    document.getElementById('period-week').addEventListener('click', () => setPeriod('week'));
    document.getElementById('period-month').addEventListener('click', () => setPeriod('month'));

    document.getElementById('csv-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const r = new FileReader();
      r.onload = () => {
        state.data = parseCSV(r.result);
        renderCards();
        updateChart();
        updateFXChart();
        const first = state.data.dates[0];
        const last = state.data.dates[state.data.dates.length - 1];
        document.getElementById('date-range').textContent = (first && last) ? `${first} → ${last} — USD / EUR` : 'Last month — USD / EUR';
      };
      r.readAsText(file);
      e.target.value = '';
    });

    window.addEventListener('resize', () => {
      const wrap = document.getElementById('candle-chart-wrap');
      if (state.chartMode === 'candle' && candleChart && wrap && wrap.style.display !== 'none') {
        const w = wrap.parentElement.clientWidth || 600;
        candleChart.applyOptions({ width: w });
      }
    });

    renderCards();
    updateChart();
    updateFXChart();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
